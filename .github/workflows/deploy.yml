name: Deploy Hemma to GitHub Pages

# Builds the React SPA (web/) and publishes the whole Hemma site to GitHub Pages
# on every push to main. The SPA is the entry point (index.html): it hosts the
# hub (/) and all migrated tools as hash routes (/#/bostadskalkyl, etc.).
# Vanilla tools that haven't yet been migrated to React are served alongside as
# static HTML files — each one is removed from the assembly step once it ships
# as a React route.

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you trigger a deploy by hand from the Actions tab

# Permissions GitHub Pages needs to publish from an Action.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish rather than cancelling it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build the React app (bostadskalkyl)
        run: |
          npm --prefix web ci
          npm --prefix web run build

      - name: Assemble the Hemma site
        run: |
          mkdir -p _site
          # SPA is the entry point — its index.html IS the hub (/ route).
          cp web/dist/index.html _site/index.html
          cp -r web/dist/bk-assets _site/bk-assets
          # Icons and manifest
          cp icon.svg manifest.webmanifest _site/
          # Vanilla tools not yet migrated to React — served as static HTML alongside
          # the SPA. Remove each tool's files below once its React route ships.
          cp calc.js _site/  # shared calc utils used by hushallsbudget
          cp hushallsbudget.html budget.css budget.js salary-store.js _site/
          # bostadskalkyl.html is now the SPA at /#/bostadskalkyl — no vanilla file needed
          # lonevaxling.html is now the SPA at /#/lonevaxling — no vanilla file needed
          # mortgagetracker.html is now the SPA at /#/bolanekoll — no vanilla file needed
          # manadsavslut.html is now the SPA at /#/manadsavslut — no vanilla file needed

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
