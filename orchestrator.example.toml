# =============================================================================
# orchestrator.example.toml — Pluggable steps (Phase 33) worked example
# =============================================================================
#
# This is a COMPLETE, annotated example showing how to inject your own steps
# into the workflow without editing any Python. To use it:
#
#   1. Copy the [[steps.*]] blocks below into your real orchestrator.toml
#      (at the project root — the same dir you run the CLI from).
#   2. Create the support files this example references (their contents are
#      shown inline in comments below each step).
#   3. Run a feature as usual. Your steps run at the seam you named.
#
# The spine never changes:
#   verify_clean_tree → plan → branch → build(impl ⇄ qa) → summarize → docs → commit → push → pr
# (the impl ⇄ qa retry loop is itself a `build` step at the after_branch seam,
# synthesized by default — see section 6. summarize + docs are built-in agents.)
#
# Seams (insertion points), in workflow order — all run BEFORE the commit
# line, so a step can never leave a half-shipped state on cancel:
#
#   before_plan    — before planning (good for pre-flight checks)
#   after_plan     — after the plan is approved, before branching
#   after_branch   — after the branch exists; where the build (impl ⇄ qa) runs
#   before_commit  — last step before the spine commits
#
# Every seam runs its steps once, in declared order. The impl ⇄ qa retry loop is
# the build step at after_branch; a step that should "run once after the build"
# is just ordered after that build (at after_branch) or placed at before_commit.
# Put costly ai_agent steps at before_commit so they run only on the final,
# QA-passed code. (Phase 46 removed the old per-attempt `after_impl` and
# pass-only `after_qa` seams — the loader raises a migration error pointing here
# if your TOML still uses them.)
#
# Validation: the manifest is checked at the start of every run (before any
# LLM spend) — unknown seam, duplicate id, missing script, unknown agent, and
# (for build steps) unresolved produce/gate references all fail loudly. The
# resolved manifest is snapshotted per run, so editing
# it while a run is paused refuses the resume rather than silently changing
# the graph. `id` is a step's resume identity — don't rename it mid-run.
# =============================================================================


# --- Standard config (unchanged by Phase 33; shown for a complete file) ------
# Phase 40: per-agent settings live under [workflow.<step>] — one table per
# spine step. `default_model` is inherited by any step that omits its `model`.

default_model = "claude-sonnet-4-6"

[workflow.planning]
human_in_loop = true   # pause for plan review before any code is written

[workflow.qa]
max_retries = 3        # implementation+QA loop attempts before giving up


# =============================================================================
# Pluggable steps
# =============================================================================

# ---------------------------------------------------------------------------
# 1) script @ before_plan — a fast pre-flight gate.
#    Runs once, before planning. A non-zero exit aborts the run immediately,
#    so you never pay for a plan when the repo isn't in a fit state.
#
#    Create .orchestrator/scripts/preflight.sh (chmod +x):
#
#      #!/bin/sh
#      # Refuse to start if there are merge-conflict markers lying around.
#      if git grep -nE '^(<<<<<<<|=======|>>>>>>>)' -- ':!orchestrator.toml'; then
#        echo "merge-conflict markers present; resolve before running"
#        exit 1
#      fi
#      exit 0
# ---------------------------------------------------------------------------
[[steps.before_plan]]
id      = "preflight"
type    = "script"
path    = ".orchestrator/scripts/preflight.sh"
timeout = 30


# ---------------------------------------------------------------------------
# 2) approval_gate @ after_plan — a sign-off on the approved plan, ONCE.
#    Pauses the workflow right after the plan is approved, before any code is
#    written. Resume it — via approve_plan(thread_id, "<reply>") over MCP, or
#    by replying at the CLI prompt. Reply 'abort' (or 'no'/'stop') to stop the
#    run cleanly (nothing is committed — gates run before the commit line);
#    any other reply proceeds. (No support file needed.)
# ---------------------------------------------------------------------------
[[steps.after_plan]]
id   = "scope-signoff"
type = "approval_gate"
ask  = "Plan approved. Confirm scope is right before we build?"


# ---------------------------------------------------------------------------
# 3) script @ before_commit — run the test suite once on the QA-passed code.
#    Fires once, after the build (impl ⇄ qa) has passed and before the spine
#    commits. A non-zero exit aborts the run — a hard gate the final code must
#    pass. To instead re-test on EVERY implementation attempt, make the script a
#    gate of a build step (see section 5).
#
#    Create .orchestrator/scripts/run-tests.sh (chmod +x):
#
#      #!/bin/sh
#      node --test calc.test.js
# ---------------------------------------------------------------------------
[[steps.before_commit]]
id      = "unit-tests"
type    = "script"
path    = ".orchestrator/scripts/run-tests.sh"
timeout = 300


# ---------------------------------------------------------------------------
# 4) ai_agent @ before_commit — generate a changelog entry, ONCE.
#    ai_agent steps run a markdown-defined agent loaded from <dir>/<agent>,
#    where `agent` is the full filename (with extension). `dir` is required and
#    per-step — point each agent at wherever its prompt lives (there is no
#    global agents directory). Place costly LLM steps at
#    before_commit so they run a single time on the final, passing code (not
#    once per retry attempt). The agent is given the plan and runs `git diff`
#    itself; it edits files in the working tree, which the spine then commits.
#
#    Set human_in_loop = true on any seam-placed ai_agent to pause for review
#    AFTER it runs (the agent's output is surfaced; reply with an abort word —
#    'abort'/'no'/'stop' — to stop, anything else to proceed). Omitted = false.
#    (On a retry-block PRODUCER the same flag pauses once after the block
#    succeeds — see section 5.)
#
#    Create .orchestrator/agents/changelog.md:
#
#      ---
#      name: changelog
#      model: claude-sonnet-4-6
#      ---
#      You maintain CHANGELOG.md for this project. Read CLAUDE.md, run
#      `git diff HEAD` to see what changed, and add a single concise entry
#      under an "Unreleased" heading describing the change in user terms.
#      Edit only CHANGELOG.md. When done, call emit_step_result with a
#      one-line summary.
# ---------------------------------------------------------------------------
[[steps.before_commit]]
id            = "changelog"
type          = "ai_agent"
agent         = "changelog.md"      # full filename (with extension)
dir           = ".orchestrator/agents"  # → .orchestrator/agents/changelog.md (required)
model         = "claude-sonnet-4-6"
human_in_loop = false               # true = pause to review the agent's output


# ---------------------------------------------------------------------------
# 5) build @ before_commit — a self-correcting loop (Phase 46, formerly `retry`).
#    A build step re-runs its PRODUCER step(s) until its GATE step(s) pass, or
#    the retry budget runs out. On each gate failure the gate's output is
#    injected into the next producer attempt as feedback (under a
#    "## Previous attempt feedback" heading), so an ai_agent producer can
#    target its fixes — the very same engine the built-in implementation↔QA
#    loop runs on (that loop IS the default build at after_branch — section 6).
#
#    Placed at before_commit, this lint-loop runs ONCE the spine's impl⇄qa build
#    has passed. (A build at after_branch instead REPLACES that default loop —
#    use after_branch only when you mean to swap the whole producer⇄gate step.)
#
#    `produce` and `gate` are lists of ids defined under [steps.defs.*] (below).
#    Gates run in declared order; the FIRST to fail short-circuits the rest and
#    triggers a retry.
#
#    Gate contract — a gate must be one of:
#      - a `script`: exit 0 = pass; non-zero = fail, and its output becomes the
#        feedback (it does NOT abort the run the way a plain script step does);
#      - an `ai_agent`: run READ-ONLY with an emit tool that requires a
#        `passed` boolean (the verdict) and a `detail` string (the feedback).
#    A producer mutates the tree; a gate only judges it. No id may be both a
#    producer and a gate.
#
#    retry = { max, on_exhausted } tunes the loop. on_exhausted (when the budget
#    runs out without a pass):
#      "abort"      — fail the run (default; nothing is committed — pre-commit)
#      "approval_gate" — ask whether to proceed or abort
#      "proceed"    — continue anyway (use with care)
#    retry.max must be >= 1. Omit `gate` and set `ungated = true` to run the
#    producer once with no gate.
#
#    A producer ai_agent may set human_in_loop = true: when the block SUCCEEDS
#    (the gate passes — first try or after retries), the workflow pauses once to
#    review that producer's final output (abort word stops, anything else
#    proceeds). It never pauses on a failed attempt, and an exhausted block is
#    governed by on_exhausted, not this flag. Ignored on a gate def.
#
#    Here: lint-fix (an agent) tries to satisfy lint-check (a script), up to 3×.
#
#    Create .orchestrator/scripts/lint.sh (chmod +x):
#      #!/bin/sh
#      npx eslint .          # exit 0 = pass; non-zero = fail (output = feedback)
#
#    Create .orchestrator/agents/lint-fixer.md:
#      ---
#      name: lint-fixer
#      model: claude-haiku-4-5-20251001
#      ---
#      You fix lint errors. If a "## Previous attempt feedback" section is
#      present it holds the lint output — fix exactly those errors and nothing
#      else. Edit only the offending source files. When done, call
#      emit_step_result with a one-line summary.
# ---------------------------------------------------------------------------
[[steps.before_commit]]
id      = "lint-loop"
type    = "build"
produce = ["lint-fix"]              # producer id(s), defined in [steps.defs.*]
gate    = ["lint-check"]            # gate id(s); first to fail triggers a retry
retry   = { max = 3, on_exhausted = "abort" }   # abort | approval_gate | proceed

# [steps.defs.*] — definitions referenced by build steps' produce/gate. These
# are NOT seam steps themselves; they only run when a block references them.
[steps.defs.lint-fix]
type          = "ai_agent"
agent         = "lint-fixer.md"     # full filename (with extension)
dir           = ".orchestrator/agents"  # → .orchestrator/agents/lint-fixer.md (required)
model         = "claude-haiku-4-5-20251001"
human_in_loop = false               # true = review the fix once lint-check passes

[steps.defs.lint-check]
type    = "script"
path    = ".orchestrator/scripts/lint.sh"
timeout = 60


# ---------------------------------------------------------------------------
# 6) The default build @ after_branch — and how to swap it (Phase 46).
#    The spine's impl ⇄ qa loop is itself a build step at the after_branch seam.
#    You don't have to write it: with no [[steps.after_branch]] build declared,
#    the workflow synthesizes this exact step —
#
#       [[steps.after_branch]]
#       id      = "build"
#       type    = "build"
#       produce = ["implementation"]    # built-in producer (the spine's agent)
#       gate    = ["qa"]                # built-in gate (the spine's QA agent)
#       retry   = { max = <[workflow.qa].max_retries>, on_exhausted = "abort" }
#
#    `implementation` and `qa` are BUILT-IN ids: a build may reference them with
#    no [steps.defs.*] entry, and they resolve to the spine's own agents. To swap
#    either, declare your own def under that id (overrides the built-in) OR
#    declare your own [[steps.after_branch]] build with different ids — e.g. to
#    drive a non-Claude coder, or to replace QA with your own gate:
#
#       [[steps.after_branch]]
#       id      = "build"
#       type    = "build"
#       produce = ["my-coder"]          # your ai_agent / script def
#       gate    = ["my-qa"]             # your gate def; or keep the built-in "qa"
#       retry   = { max = 3, on_exhausted = "abort" }
#       # ungated = true                # opt out of gating entirely (e.g. dbt)
#
#    Declaring ANY build at after_branch suppresses the default — yours runs
#    instead. A user-declared build runs on the pure engine (Phase-44 producer
#    review + on_exhausted); the default build additionally honours
#    [workflow.implementation].human_in_loop and [workflow.qa].human_in_loop.
# ---------------------------------------------------------------------------
