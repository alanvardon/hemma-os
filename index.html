<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bostadskalkyl</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #e8e6df;
  --ink-mid: #b0aea6;
  --ink-soft: #7a7a72;
  --ink-faint: #4e4e48;
  --paper: #1c1c1a;
  --paper-warm: #242420;
  --paper-card: #212120;
  --accent: #4a8a5e;
  --accent-light: #6aaa7e;
  --accent-faint: #1e2e22;
  --warn: #c4723a;
  --warn-light: #d4923a;
  --warn-faint: #2e2018;
  --rule: #333330;
}

html, body {
  min-height: 100%;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--paper);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.5;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* Header */
.home-header {
  padding: 1.5rem 2rem;
  border-bottom: 1px solid var(--rule);
  background: var(--paper-card);
}

.home-logo {
  font-family: 'DM Serif Display', serif;
  font-size: 1.4rem;
  font-weight: 400;
  color: var(--ink);
  letter-spacing: -0.01em;
}

/* Main */
.home-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 4rem 1.5rem 3rem;
  gap: 3rem;
}

/* Hero */
.home-hero {
  text-align: center;
  max-width: 520px;
}

.home-hero h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 2.6rem;
  font-weight: 400;
  color: var(--ink);
  letter-spacing: -0.02em;
  line-height: 1.15;
  margin-bottom: 1rem;
}

.home-hero__sub {
  color: var(--ink-mid);
  font-size: 16px;
  font-weight: 300;
  line-height: 1.6;
}

/* Tools grid */
.home-tools {
  display: flex;
  justify-content: center;
  width: 100%;
}

/* Tool card */
.tool-card {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  width: 100%;
  max-width: 420px;
  background: var(--paper-card);
  border: 1px solid var(--rule);
  border-radius: 12px;
  padding: 2rem;
  text-decoration: none;
  color: inherit;
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
}

.tool-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
}

.tool-card__icon {
  font-size: 2rem;
  line-height: 1;
  margin-bottom: 0.4rem;
}

.tool-card__title {
  font-family: 'DM Serif Display', serif;
  font-size: 1.4rem;
  font-weight: 400;
  color: var(--ink);
  letter-spacing: -0.01em;
}

.tool-card__desc {
  color: var(--ink-mid);
  font-size: 14px;
  font-weight: 300;
  line-height: 1.55;
}

.tool-card__cta {
  display: inline-block;
  margin-top: 0.6rem;
  color: var(--accent-light);
  font-size: 14px;
  font-weight: 500;
}

/* Footer */
.home-footer {
  padding: 1.5rem 2rem;
  border-top: 1px solid var(--rule);
  text-align: center;
  color: var(--ink-soft);
  font-size: 13px;
  font-weight: 300;
}
</style>
</head>
<body id="home-root">

<header class="home-header">
  <span class="home-logo">Bostadskalkyl</span>
</header>

<main class="home-main">
  <section class="home-hero">
    <h1>Din kompletta bostadskalkyl</h1>
    <p class="home-hero__sub">Räkna på kostnader, amortering och din köpkraft – enkelt och gratis.</p>
  </section>

  <section class="home-tools">
    <a href="kalkyl.html" class="tool-card">
      <div class="tool-card__icon">🏠</div>
      <h2 class="tool-card__title">Bostadskalkyl</h2>
      <p class="tool-card__desc">Beräkna månadskostand, amortering, belåningsgrad och mer.</p>
      <span class="tool-card__cta">Öppna kalkylen →</span>
    </a>
  </section>
</main>

<footer class="home-footer">
  <p>© 2025 Bostadskalkyl</p>
</footer>

</body>
</html>
