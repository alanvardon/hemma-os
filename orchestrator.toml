# orchestrator.toml — all fields are optional; values shown are the defaults.
# Place this file at the project root (same directory you run the CLI from).

# [qa]
# Directory (relative to project root) containing executable scripted QA checks.
# Every executable file is run in sorted order before the LLM QA agent.
# A non-zero exit from any script aborts QA immediately.
# qa_scripts_dir = ".orchestrator/qa"
# Maximum seconds allowed per script before it is killed (exit code 124).
# qa_scripts_timeout = 60

# Maximum number of implementation+QA loop attempts before giving up.
# On failure the branch and diffs are preserved for manual review.
max_retries = 3

# SQLite checkpoint database path (relative to cwd / project root).
db_path = ".orchestrator/checkpoints.db"

[models]
# Claude model IDs used by each agent.
# Swap to "claude-opus-4-7" for higher quality, "claude-haiku-4-5-20251001" for speed/cost.
planning       = "claude-sonnet-4-6"
implementation = "claude-sonnet-4-6"
qa             = "claude-sonnet-4-6"
docs           = "claude-sonnet-4-6"  # documentation agent (Phase 26)

[human_in_loop]
# Each flag gates an interrupt() at that workflow stage boundary.
# true  = pause and ask; false = auto-proceed (fully autonomous for that stage).
approve_plan           = true   # pause for plan review before any code is written
approve_branch         = false  # pause before the feature branch is created
approve_implementation = false  # pause after each implementation attempt, before QA
approve_qa_failure     = false  # pause on QA FAIL — lets you abort instead of retrying
approve_pr             = false  # pause after QA PASS, before commit + PR is opened
docs                   = false  # pause after the doc agent runs, before commit

[docs]
# Documentation agent (Phase 26). Runs after QA passes and before commit;
# reads the plan + diff and updates affected markdown docs so they land in
# the same commit as the code change. Set enabled = false to skip it.
enabled = true
# Extensions the doc agent is allowed to write. Touching anything else aborts
# the workflow with a clear scope error — the hard gate behind the agent's
# "documentation only" instruction.
allowed_extensions = [".md", ".rst", ".txt"]

[branch]
# Maximum length of the kebab-case slug in the branch name.
# e.g. "feature/ltv-calculation-rounding-error" — slug part only, not the prefix.
max_slug_length = 50

[pr]
# Base branch the PR targets.
base_branch = "main"

# Open the PR as a draft (true) or ready-for-review (false).
draft = false

# GitHub usernames to request review from. Empty list = no reviewers requested.
reviewers = []

# Labels to attach to the PR. Empty list = no labels attached.
labels = ["feature", "bug", "refactor", "chore"]

# ---------------------------------------------------------------------------
# Tool permission profiles
# Pinned MCP server tools (e.g. mcp__orchestrator__emit_implementation_result)
# are injected automatically by the orchestrator and do not need to be listed
# here.
# Note: [tools.planning] has no effect — the planning agent uses the raw
# Anthropic SDK and ignores this section. A warning is emitted if present.
# ---------------------------------------------------------------------------

[tools.implementation]
allowed_tools    = ["Read", "Edit", "Write", "Bash"]
disallowed_tools = []

[tools.qa]
allowed_tools    = ["Read", "Grep", "Bash"]
disallowed_tools = []

# Doc agent edits markdown only. The extension guardrail in agents/docs.py
# (see [docs] allowed_extensions) — not this allowlist — is what enforces
# that; these tools just let it read the diff and write the doc files.
[tools.docs]
allowed_tools    = ["Read", "Edit", "Write", "Bash", "Grep"]
disallowed_tools = []
