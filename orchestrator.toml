# orchestrator.toml — all config fields are optional; values shown are the defaults.
# Place this file at the project root (same directory you run the CLI from).
#
# Phase 40: per-agent settings are consolidated under [workflow.<step>] — one
# table per spine step carries its model, human-in-loop gate, tool permissions,
# and optional timeout. Unknown keys are rejected at load time (fail-loud), so a
# typo can't be silently ignored.

# Model used by any [workflow.*] step whose `model` is left unset.
# Swap to "claude-opus-4-7" for higher quality, "claude-haiku-4-5-20251001" for speed/cost.
default_model = "claude-sonnet-4-6"

# SQLite checkpoint database path (relative to cwd / project root).
db_path = ".orchestrator/checkpoints.db"

# Directory (relative to project root) where pluggable-step agent prompts live.
agents_dir = ".orchestrator/agents"

[pre_hooks]
# Pre-flight scripts run after the clean-tree check, before any LLM spend.
# A non-zero exit aborts the run.
dir     = ".orchestrator/pre-hooks"
timeout = 30

[qa]
# Scripted QA gate: every executable file in scripts_dir runs (sorted) before
# the LLM QA agent. A non-zero exit fails QA immediately. Distinct from
# [workflow.qa] below, which configures the QA *agent*.
scripts_dir     = ".orchestrator/qa"
scripts_timeout = 60

# ---------------------------------------------------------------------------
# Built-in workflow steps. One [workflow.<step>] table per spine step:
#   model            — omit to inherit default_model
#   human_in_loop    — pause with an interrupt() at that stage boundary
#   allowed_tools    — agent tool allowlist (implementation / qa)
#   disallowed_tools — agent tool denylist
#   timeout          — wall-clock seconds for the agent loop (omit = no limit)
# Counterpart to [steps.*] below: [workflow.*] = built-in, [steps.*] = injected.
# ---------------------------------------------------------------------------

[workflow.planning]
human_in_loop = true     # pause for plan review before any code is written

[workflow.branch]
max_slug_length = 50     # kebab-case slug length in the branch name (slug part only)
human_in_loop   = false  # pause before the feature branch is created

[workflow.implementation]
human_in_loop    = false  # pause after each implementation attempt, before QA
allowed_tools    = ["Read", "Edit", "Write", "Bash"]
disallowed_tools = []

[workflow.qa]
human_in_loop    = false  # pause on QA FAIL — lets you abort instead of retrying
allowed_tools    = ["Read", "Grep", "Bash"]
disallowed_tools = []
max_retries      = 3      # implementation+QA loop attempts before giving up

[workflow.docs]
# Baked-in docs agent (Phase 41). Haiku by default — a read-diff / edit-md task.
model   = "claude-haiku-4-5-20251001"
timeout = 120

[workflow.summarize]
# Baked-in summarizer (Phase 42). After QA passes, it reads the plan + `git diff
# HEAD` and produces the commit/PR summary + test plan. Read-only (Bash for the
# diff, no Edit/Write). Haiku by default — a cheap read-the-diff task.
model         = "claude-haiku-4-5-20251001"
allowed_tools = ["Read", "Bash", "Grep"]
timeout       = 120

[workflow.commit]
human_in_loop = false    # pause after QA PASS, before commit + PR is opened

[git]
# Before pushing, rebase the feature branch onto origin/<base_branch> if it
# moved since the branch was created (Phase 22). false = push without rebasing
# (a rebase conflict otherwise surfaces as a user-action-required error).
auto_rebase = true

[pr]
# Base branch the PR targets.
base_branch = "main"
# Open the PR as a draft (true) or ready-for-review (false).
draft = false
# GitHub usernames to request review from. Empty list = no reviewers requested.
reviewers = []
# Note: the PR label is auto-applied from the plan type (feature → "feature",
# fix → "bug", refactor → "refactor", chore → "chore"). There is no `labels` key.

[audit]
# Append a JSONL audit event (stage start/end, interrupt, resume, cancel) to
# log_path for each run. Set enabled = false to disable the audit log entirely.
enabled         = true
log_path        = ".orchestrator/audit.log"
include_content = false   # if true, also log prompt/result content (verbose)

# ---------------------------------------------------------------------------
# Pluggable steps (Phase 33)
# Inject extra steps into the workflow at fixed "seams" — no edits to
# workflow.py. The spine (verify_clean_tree → plan → branch → impl ⇄ qa →
# summarize → docs → commit → push → pr) stays fixed; your steps run at the
# seam you name.
#
# Seams (all run before the commit line, so cancel stays safe):
#   before_plan · after_plan · after_impl · after_qa · before_commit
# before_plan / after_plan / before_commit run once. after_impl fires on
# EVERY impl attempt (the code changes each attempt). after_qa fires ONCE,
# only after QA has PASSED (never on a failed attempt). Put costly llm_agent
# steps at before_commit (or after_qa) so they run on the final, passing code.
#
# Step types:
#   script      — run an executable; non-zero exit aborts the workflow
#                 (must be chmod +x with a shebang — see NOTES.md)
#   human_gate  — pause for a decision: reply 'abort' (or 'no'/'stop') to stop
#                 the run, any other reply to proceed
#   llm_agent   — run a markdown agent at <agents_dir>/<agent>.md
#   retry       — re-run producer step(s) until gate step(s) pass, injecting the
#                 failing gate's feedback into the next attempt (Phase 42). The
#                 producer/gate steps are defined in a [steps.defs.*] table and
#                 referenced by id. See orchestrator.example.toml for the fully
#                 commented `lint-loop` worked example and the gate contract.
#
# `id` is the step's resume identity — don't rename it mid-run. The manifest
# is validated at load time (unknown seam, duplicate id, missing script,
# unknown agent, and — for retry blocks — unresolved produce/gate references)
# and snapshotted per run: editing it mid-run refuses resume.
#
# Examples (uncomment and provide the referenced files to enable):
#
# [[steps.before_plan]]
# id      = "lint"
# type    = "script"
# path    = ".orchestrator/scripts/lint.sh"
# timeout = 60
#
# [[steps.after_qa]]
# id    = "docs"
# type  = "llm_agent"
# agent = "docs"                 # → .orchestrator/agents/docs.md
# model = "claude-sonnet-4-6"
#
# [[steps.after_qa]]
# id   = "security_gate"
# type = "human_gate"
# ask  = "QA passed. Approve security posture before commit?"
# ---------------------------------------------------------------------------

# --- Built-in spine agents: docs (Phase 41) + summarizer (Phase 42) -----------
# The docs agent used to be a live [[steps.before_commit]] step here. It is now
# a permanent part of the workflow spine, and Phase 42 added a sibling
# summarizer (it derives the commit/PR summary + test plan from the diff after
# QA passes). Both run automatically on every run — no [steps.*] entry required
# — and their prompts ship in the package at orchestrator/orchestrator/prompts/
# docs.md and summarize.md (tracked), loaded via the same loader as
# planning/implementation/qa. Configure them under [workflow.docs] and
# [workflow.summarize] above.
#
# To customise either prompt, drop your own .orchestrator/prompts/docs.md or
# .orchestrator/prompts/summarize.md in the repo — load_prompt prefers that
# override over the packaged default (same mechanism as the other agents).
# The before_commit seam remains open for your own pluggable steps.
