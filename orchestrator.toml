# orchestrator.toml — the v2 declarative pipeline (Phase 68).
#
# Two axes describe everything (see orchestrator.example.toml for the full guide):
#   in the flow + built-in     -> [stage.builtin.<id>]
#   in the flow + yours        -> [stage.user.<id>]
#   a reusable part + built-in -> [builtin.<id>]   (referenced as builtin:<id>)
#   a reusable part + yours    -> [defs.<id>]      (referenced as defs:<id>)
#
# ORDER comes ONLY from the `flow` line; the git rails (verify-clean-tree, branch,
# commit, push, open-pr) are implicit and locked. This file mirrors the built-in
# defaults — edit `flow` / the stages to change the pipeline.

default_model           = "claude-sonnet-4-6"
db_path                 = ".orchestrator/checkpoints.db"
# Never pause for a human (CI / unattended). Suppresses every human_in_loop gate,
# auto-approves approval gates, and makes build retries unbounded.
fully_autonomous        = false
# Safety rails for the unbounded loop above; enforced ONLY when fully_autonomous.
# Both <= 0 = no ceiling. A trip → status="cancelled", reason="autonomous_ceiling".
autonomous_max_seconds  = 0
autonomous_max_cost_usd = 0.0

flow = "plan >> decompose >> task-build >> docs >> summarize"

# ── TDD red-green station (Phase 72–74) ──
# With tdd on, each task first gets failing tests from a separate test-author,
# a read-only coverage critic judges they're meaningful, then a human reviews the
# RED suite before the implementer makes them green. test_paths is the globset the
# author writes into and the diff-gate freezes during implementation.
tdd        = true
test_paths = ["calc.test.js"]


[stage.builtin.plan]
type          = "ai_agent"
human_in_loop = true                 # pause to review the plan + task list

[stage.builtin.decompose]
type      = "ai_agent"
max_tasks = 0                        # 0 = uncapped; >0 = advisory soft cap

# The per-task station: run produce⇄gate once per decomposed task (the implement⇄QA
# auto-fix retry runs per task). produce/gate reference parts by prefixed id.
[stage.builtin.task-build]
produce = ["builtin:implementation"]
gate    = ["defs:tests", "builtin:qa"]   # cheap deterministic tests first, then the QA agent
retry   = { max = 3, on_exhausted = "approval_gate" }   # or "abort" / "proceed"

[stage.builtin.docs]
type    = "ai_agent"
model   = "claude-haiku-4-5-20251001"
timeout = 120

[stage.builtin.summarize]
type          = "ai_agent"
model         = "claude-haiku-4-5-20251001"
allowed_tools = ["Read", "Bash", "Grep"]
timeout       = 120


# ── reusable parts: the spine's own producer / gate (referenced above) ──
[builtin.implementation]
allowed_tools = ["Read", "Edit", "Write", "Bash"]

[builtin.qa]
allowed_tools = ["Read", "Grep", "Bash"]


# ── your reusable parts: referenced as defs:<id> ──
[defs.tests]
type = "script"
path = ".orchestrator/checks/tests.sh"   # deterministic unit-test gate (Phase 71)


# ── locked git rails (config only — you can't reorder/remove them) ──
[branch]
max_slug_length = 50

[git]
auto_rebase = true

[pr]
base_branch = "main"
draft       = false
reviewers   = []


# ── infrastructure ──
[pre_hooks]
dir     = ".orchestrator/pre-hooks"   # scripts run after clean-tree, before LLM spend
timeout = 30

[qa]
# Scripted QA gate: every executable in scripts_dir runs (sorted) before the QA
# agent; a non-zero exit fails QA immediately. Distinct from the qa stage/part.
scripts_dir     = ".orchestrator/qa"
scripts_timeout = 60

[audit]
enabled         = true
log_path        = ".orchestrator/audit.log"
include_content = false
