# orchestrator.toml — all config fields are optional; values shown are the defaults.
# Place this file at the project root (same directory you run the CLI from).
#
# Phase 40: per-agent settings are consolidated under [workflow.<step>] — one
# table per spine step carries its model, human-in-loop gate, tool permissions,
# and optional timeout. Unknown keys are rejected at load time (fail-loud), so a
# typo can't be silently ignored.

# Model used by any [workflow.*] step whose `model` is left unset.
# Swap to "claude-opus-4-7" for higher quality, "claude-haiku-4-5-20251001" for speed/cost.
default_model = "claude-sonnet-4-6"

# SQLite checkpoint database path (relative to cwd / project root).
db_path = ".orchestrator/checkpoints.db"

[pre_hooks]
# Pre-flight scripts run after the clean-tree check, before any LLM spend.
# A non-zero exit aborts the run.
dir     = ".orchestrator/pre-hooks"
timeout = 30

[qa]
# Scripted QA gate: every executable file in scripts_dir runs (sorted) before
# the LLM QA agent. A non-zero exit fails QA immediately. Distinct from
# [workflow.qa] below, which configures the QA *agent*.
scripts_dir     = ".orchestrator/qa"
scripts_timeout = 60

# ---------------------------------------------------------------------------
# Built-in workflow steps. One [workflow.<step>] table per spine step:
#   model            — omit to inherit default_model
#   human_in_loop    — pause with an interrupt() at that stage boundary
#                      (planning / branch / commit only; the build's pauses live
#                      on the build step — see [[steps.work]])
#   allowed_tools    — agent tool allowlist (implementation / qa)
#   disallowed_tools — agent tool denylist
#   timeout          — wall-clock seconds for the agent loop (omit = no limit)
# Counterpart to [steps.*] below: [workflow.*] = built-in, [steps.*] = injected.
# ---------------------------------------------------------------------------

[workflow.planning]
human_in_loop = true     # pause for plan review before any code is written

[workflow.branch]
max_slug_length = 50     # kebab-case slug length in the branch name (slug part only)
human_in_loop   = false  # pause before the feature branch is created

[workflow.implementation]
# Phase 51: the "pause after the producer, before the gate" pause moved onto the
# build step's human_in_loop = { after_producer = true } (see [[steps.work]]).
# Setting human_in_loop here is now an error at load time.
allowed_tools    = ["Read", "Edit", "Write", "Bash"]
disallowed_tools = []

[workflow.qa]
# Phase 51: the "pause on a QA FAIL" pause moved onto the build step's
# human_in_loop = { on_gate_fail = true } (see [[steps.work]]). Setting
# human_in_loop here is now an error at load time.
allowed_tools    = ["Read", "Grep", "Bash"]
disallowed_tools = []
# Phase 47: the impl⇄QA retry budget now lives on the build step's `retry.max`
# (see [[steps.work]] below) — the single, visible source of truth. This
# field (and ORCHESTRATOR_MAX_RETRIES) is retained for back-compat but no longer
# drives the loop; set the budget on the build step instead.
max_retries      = 3

[workflow.docs]
# Baked-in docs agent (Phase 41). Haiku by default — a read-diff / edit-md task.
model   = "claude-haiku-4-5-20251001"
timeout = 120

[workflow.summarize]
# Baked-in summarizer (Phase 42). After QA passes, it reads the plan + `git diff
# HEAD` and produces the commit/PR summary + test plan. Read-only (Bash for the
# diff, no Edit/Write). Haiku by default — a cheap read-the-diff task.
model         = "claude-haiku-4-5-20251001"
allowed_tools = ["Read", "Bash", "Grep"]
timeout       = 120

[workflow.commit]
human_in_loop = false    # pause after QA PASS, before commit + PR is opened

[git]
# Before pushing, rebase the feature branch onto origin/<base_branch> if it
# moved since the branch was created (Phase 22). false = push without rebasing
# (a rebase conflict otherwise surfaces as a user-action-required error).
auto_rebase = true

[pr]
# Base branch the PR targets.
base_branch = "main"
# Open the PR as a draft (true) or ready-for-review (false).
draft = false
# GitHub usernames to request review from. Empty list = no reviewers requested.
reviewers = []
# Note: the PR label is auto-applied from the plan type (feature → "feature",
# fix → "bug", refactor → "refactor", chore → "chore"). There is no `labels` key.

[audit]
# Append a JSONL audit event (stage start/end, interrupt, resume, cancel) to
# log_path for each run. Set enabled = false to disable the audit log entirely.
enabled         = true
log_path        = ".orchestrator/audit.log"
include_content = false   # if true, also log prompt/result content (verbose)

# ---------------------------------------------------------------------------
# The work list (Phase 33; reshaped Phase 49)
# Declare extra steps in ONE ordered list — no edits to workflow.py. The spine
# (verify_clean_tree → plan → branch → [work] → summarize → docs → commit →
# push → pr) stays fixed; setup and shipping are tuned via the [workflow.*] /
# [pre_hooks] / [pr] tables, never listed. The one project-specific region is
# `[[steps.work]]`: it runs AFTER the branch is made and BEFORE summarize.
#
# Steps run in declared (list) order. The whole region is pre-commit, so a
# cancel/abort never leaves a half-shipped state. The impl ⇄ qa loop is itself
# a `build` step in this list, declared EXPLICITLY below (Phase 47; there is no
# hidden default — what runs is exactly what's in this file). Because work runs
# before summarize, every step's output is included in the commit/PR diff.
#
# (Phase 49 collapsed the old before_plan / after_plan / after_branch /
# before_commit seams into this one list — the pre-plan use case is [pre_hooks];
# plan sign-off is [workflow.planning].human_in_loop. The loader raises a
# migration error if a TOML still names an old seam.)
#
# Step types:
#   script      — run an executable; non-zero exit aborts the workflow
#                 (must be chmod +x with a shebang — see NOTES.md)
#   approval_gate  — pause for a decision: reply 'abort' (or 'no'/'stop') to stop
#                 the run, any other reply to proceed
#   ai_agent   — run a markdown agent whose prompt is at `agent`, a single
#                 project-root-relative path with the full filename (store
#                 agents wherever you like). Set human_in_loop = true to pause
#                 for review AFTER it runs (same abort/proceed reply as
#                 approval_gate).
#   build       — run producer step(s), then gate step(s), re-running the
#                 producers with the failing gate's feedback until a gate passes
#                 or retry.max is exhausted (Phase 46). produce/gate reference
#                 [steps.defs.*] ids; `retry = { max, on_exhausted }` tunes the
#                 loop. A build step must list a gate unless `ungated = true`
#                 (then the producer runs once). See orchestrator.example.toml
#                 for the fully commented `lint-loop` worked example.
#
# `id` is the step's resume identity — don't rename it mid-run. The manifest
# is validated at load time (unknown seam, duplicate id, missing script,
# unknown agent, and — for build steps — unresolved produce/gate references)
# and snapshotted per run: editing it mid-run refuses resume.
#
# Examples (uncomment and provide the referenced files to enable) — these run
# AFTER the build below, in list order:
#
# [[steps.work]]
# id            = "docs"
# type          = "ai_agent"
# agent         = ".orchestrator/agents/docs.md"  # project-root-relative path
# model         = "claude-sonnet-4-6"
# human_in_loop = false              # true = pause to review the agent's output
#
# [[steps.work]]
# id   = "security_gate"
# type = "approval_gate"
# ask  = "QA passed. Approve security posture before commit?"
# ---------------------------------------------------------------------------

# --- The build step: the impl ⇄ qa loop (Phase 47) ----------------------------
# This is the spine's core producer⇄gate loop, declared explicitly so it is
# visible and editable here rather than synthesized behind the scenes. The
# producer writes code; the gate (QA) judges it; on a FAIL the gate's feedback
# is injected into the next attempt, looping until QA passes or `retry.max`
# runs out (then on_exhausted="abort" ends the run as failed — no commit/PR).
#
# `implementation` and `qa` are BUILT-IN ids: they resolve to the spine's own
# implementation agent and QA agent (configured under [workflow.implementation]
# and [workflow.qa] above) without needing a [steps.defs.*] entry. To swap
# either, declare your own def under that id — e.g. [steps.defs.qa] with a
# script or ai_agent — or change `produce` / `gate` to your own ids. Remove
# this block entirely and a run will pass through with status="no_changes"
# (nothing produces a diff).
#
# Phase 51: opt into the two human pauses on the build step itself via
# human_in_loop = { after_producer, on_gate_fail } (both default off):
#   after_producer — pause after the producer, before the gate, every attempt
#   on_gate_fail   — pause on a gate FAIL; reply 'abort' to stop, else retry
# These work for ANY producer/gate, not just the built-in implementation/qa.
#
# This is the first entry in the work list; any [[steps.work]] you add runs
# after it, in declared order.
[[steps.work]]
id      = "build"
type    = "build"
produce = ["implementation"]                  # built-in producer (the coder agent)
gate    = ["qa"]                              # built-in gate (the QA agent)
retry   = { max = 3, on_exhausted = "abort" }  # attempts before giving up
# human_in_loop = { after_producer = false, on_gate_fail = false }  # opt-in pauses

# --- Built-in spine agents: docs (Phase 41) + summarizer (Phase 42) -----------
# The docs agent used to be a live pluggable step here. It is now
# a permanent part of the workflow spine, and Phase 42 added a sibling
# summarizer (it derives the commit/PR summary + test plan from the diff after
# QA passes). Both run automatically on every run — no [steps.*] entry required
# — and their prompts ship in the package at orchestrator/orchestrator/prompts/
# docs.md and summarize.md (tracked), loaded via the same loader as
# planning/implementation/qa. Configure them under [workflow.docs] and
# [workflow.summarize] above.
#
# To customise either prompt, drop your own .orchestrator/prompts/docs.md or
# .orchestrator/prompts/summarize.md in the repo — load_prompt prefers that
# override over the packaged default (same mechanism as the other agents).
# Add your own [[steps.work]] entries above (after the build) to run extra
# pluggable steps on the QA-passed tree before summarize.
